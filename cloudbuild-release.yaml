# Cloud Build release pipeline for audit-verify.
# Fires on version tags (v[0-9]*) via a Cloud Build trigger in relayone-488319.
# Builds four platform binaries, signs each with cosign + GCP KMS,
# and creates a GitHub release with all artifacts.
#
# NOTE: CI/CD runs on GCP Cloud Build, not GitHub Actions.
# See BUILD.md for setup instructions.
steps:
  - name: golang:1.21
    id: build-linux-amd64
    env:
      - CGO_ENABLED=0
      - GOOS=linux
      - GOARCH=amd64
    args: [go, build, -ldflags=-s -w, -o, /workspace/dist/audit-verify-linux-amd64, .]

  - name: golang:1.21
    id: build-darwin-amd64
    waitFor: ["-"]
    env:
      - CGO_ENABLED=0
      - GOOS=darwin
      - GOARCH=amd64
    args: [go, build, -ldflags=-s -w, -o, /workspace/dist/audit-verify-darwin-amd64, .]

  - name: golang:1.21
    id: build-darwin-arm64
    waitFor: ["-"]
    env:
      - CGO_ENABLED=0
      - GOOS=darwin
      - GOARCH=arm64
    args: [go, build, -ldflags=-s -w, -o, /workspace/dist/audit-verify-darwin-arm64, .]

  - name: golang:1.21
    id: build-windows-amd64
    waitFor: ["-"]
    env:
      - CGO_ENABLED=0
      - GOOS=windows
      - GOARCH=amd64
    args: [go, build, -ldflags=-s -w, -o, /workspace/dist/audit-verify-windows-amd64.exe, .]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: sha256sums
    waitFor: [build-linux-amd64, build-darwin-amd64, build-darwin-arm64, build-windows-amd64]
    script: |
      #!/bin/bash
      sha256sum /workspace/dist/audit-verify-* > /workspace/dist/SHA256SUMS
      cat /workspace/dist/SHA256SUMS
      # Cosign container runs as non-root; ensure all users can write signatures.
      chmod -R a+w /workspace/dist

  - name: gcr.io/projectsigstore/cosign:v2.2.0
    id: cosign-linux-amd64
    waitFor: [sha256sums]
    env:
      - COSIGN_YES=true
    args:
      - sign-blob
      - /workspace/dist/audit-verify-linux-amd64
      - --key
      - gcpkms://projects/relayone-488319/locations/global/keyRings/release-signing/cryptoKeys/audit-verify-signing
      - --output-signature
      - /workspace/dist/audit-verify-linux-amd64.sig

  - name: gcr.io/projectsigstore/cosign:v2.2.0
    id: cosign-darwin-amd64
    waitFor: [sha256sums]
    env:
      - COSIGN_YES=true
    args:
      - sign-blob
      - /workspace/dist/audit-verify-darwin-amd64
      - --key
      - gcpkms://projects/relayone-488319/locations/global/keyRings/release-signing/cryptoKeys/audit-verify-signing
      - --output-signature
      - /workspace/dist/audit-verify-darwin-amd64.sig

  - name: gcr.io/projectsigstore/cosign:v2.2.0
    id: cosign-darwin-arm64
    waitFor: [sha256sums]
    env:
      - COSIGN_YES=true
    args:
      - sign-blob
      - /workspace/dist/audit-verify-darwin-arm64
      - --key
      - gcpkms://projects/relayone-488319/locations/global/keyRings/release-signing/cryptoKeys/audit-verify-signing
      - --output-signature
      - /workspace/dist/audit-verify-darwin-arm64.sig

  - name: gcr.io/projectsigstore/cosign:v2.2.0
    id: cosign-windows-amd64
    waitFor: [sha256sums]
    env:
      - COSIGN_YES=true
    args:
      - sign-blob
      - /workspace/dist/audit-verify-windows-amd64.exe
      - --key
      - gcpkms://projects/relayone-488319/locations/global/keyRings/release-signing/cryptoKeys/audit-verify-signing
      - --output-signature
      - /workspace/dist/audit-verify-windows-amd64.exe.sig

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: github-release
    waitFor: [cosign-linux-amd64, cosign-darwin-amd64, cosign-darwin-arm64, cosign-windows-amd64]
    secretEnv: [GITHUB_TOKEN]
    script: |
      #!/bin/bash
      set -euo pipefail
      export GH_TOKEN="$GITHUB_TOKEN"
      TAG="${_TAG_NAME}"
      # Create the release if it does not exist, then upload (--clobber) artifacts.
      # This handles both the first-time case and re-runs against an existing tag.
      if gh release view "$TAG" --repo RelayOne/audit-verify &>/dev/null; then
        echo "Release $TAG already exists — uploading/replacing assets."
        gh release upload "$TAG" /workspace/dist/* \
          --repo RelayOne/audit-verify \
          --clobber
      else
        gh release create "$TAG" /workspace/dist/* \
          --repo RelayOne/audit-verify \
          --title "audit-verify ${TAG}" \
          --notes-file RELEASES.md
      fi

availableSecrets:
  secretManager:
    - versionName: projects/relayone-488319/secrets/github-release-token/versions/latest
      env: GITHUB_TOKEN

serviceAccount: projects/relayone-488319/serviceAccounts/release-builder@relayone-488319.iam.gserviceaccount.com

options:
  logging: CLOUD_LOGGING_ONLY
